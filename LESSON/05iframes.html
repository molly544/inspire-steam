<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <!--
    Embed another website'Contentwithin your website
    
    Attributes
    src-link to the resource online
    width,height-size of the window (pixels)
    title-people with screen readers etc
    allow full screen-let the user go full screen-->
    <iframe
    
    width="560"
    height="315" src="https://www.youtube.com/embed/H0u1FFvfdBY?si=tTHpeSjkHXpYJ-tC"
     title="YouTube video player"
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
       referrerpolicy="strict-origin-when-cross-origin"
       allowfullscreen>
    </iframe>
</body>
</html>
